name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # On augmente la mémoire et le temps pour éviter les erreurs
    env:
      GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.jvmargs=-Xmx2048m"
      JAVA_OPTS: "-Xmx2048m"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          build-essential \
          libssl-dev \
          libffi-dev \
          libsqlite3-dev \
          zlib1g-dev \
          libbz2-dev \
          libreadline-dev \
          libncurses5-dev \
          autoconf \
          automake \
          libtool \
          m4 \
          pkg-config \
          libxml2-dev \
          libxmlsec1-dev \
          ninja-build

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install --upgrade buildozer cython virtualenv

    - name: Build APK
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        export ANDROID_HOME="$HOME/.buildozer/android/platform/android-sdk"
        export ANDROID_NDK="$HOME/.buildozer/android/platform/android-ndk-r25c"
        export ANDROID_API=33
        export ANDROID_MIN_API=21
        # On nettoie avant de compiler pour éviter les conflits
        buildozer android clean
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SidikiToureSTEM-APK
        path: bin/*.apk
