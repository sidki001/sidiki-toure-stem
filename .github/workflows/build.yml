name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build APK with Docker
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          kivy/buildozer:latest \
          bash -c "echo 'y' | buildozer android debug"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: SidikiToureSTEM-APK
        path: bin/*.apk
